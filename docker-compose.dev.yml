# Optimized docker-compose for development
# Usage: docker-compose -f docker-compose.dev.yml up
#
# This setup is optimized for Windows/WSL2 with:
# - No volume mounting of node_modules (major speed improvement)
# - Selective file sync for source code only
# - Pre-built dependencies in image
# - Faster cold starts

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
      - "${DEBUG_PORT:-9229}:9229"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - PORT=${APP_PORT:-8000}
      - SEED_ON_EMPTY=${SEED_ON_EMPTY:-true}
      - SEED_DATABASE=${SEED_DATABASE:-false}
      - SEED_SUPER_ADMIN_CLERK_UID=${SEED_SUPER_ADMIN_CLERK_UID:-}
    depends_on:
      redis:
        condition: service_started
    volumes:
      # Only mount source files, not node_modules
      - ./src:/app/src:cached
      - ./prisma:/app/prisma:cached
      - uploads_data:/app/uploads
    networks:
      - kindercare-network
    # Use polling for file changes (more reliable on Windows)
    command: npm run start:dev -- --preserveWatchOutput

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - kindercare-network

networks:
  kindercare-network:
    driver: bridge

volumes:
  redis_data:
  uploads_data:
