services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - PORT=${APP_PORT:-8000}
      - SEED_SUPER_ADMIN_CLERK_UID=${SEED_SUPER_ADMIN_CLERK_UID:-}
    depends_on:
      redis:
        condition: service_started
    command: npm run start:prod
    networks:
      - kindercare-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    networks:
      - kindercare-network

networks:
  kindercare-network:
    driver: bridge

volumes:
  redis_data:
