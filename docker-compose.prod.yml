services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-kindercare_backend}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - PORT=${APP_PORT:-8000}
      - SEED_SUPER_ADMIN_CLERK_UID=${SEED_SUPER_ADMIN_CLERK_UID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: npm run start:prod
    networks:
      - kindercare-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-kindercare_backend}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kindercare-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    networks:
      - kindercare-network

networks:
  kindercare-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
