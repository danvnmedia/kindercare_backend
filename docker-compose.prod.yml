services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run build && npm run start:prod
    networks:
      - kindercare-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-nestjs_boilerplate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nestjs_boilerplate"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kindercare-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    networks:
      - kindercare-network

networks:
  kindercare-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
