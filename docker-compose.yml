services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
      - "${DEBUG_PORT:-9229}:9229"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - PORT=${APP_PORT:-8000}
      # Seeding options:
      # SEED_DATABASE=true - Always run seed on startup
      # SEED_ON_EMPTY=true - Only seed if database is empty (recommended for dev)
      - SEED_ON_EMPTY=${SEED_ON_EMPTY:-true}
      # Default true for local Docker so new RBAC permissions/roles are backfilled on existing dev DBs.
      - SEED_DATABASE=${SEED_DATABASE:-true}
      - SEED_SUPER_ADMIN_CLERK_UID=${SEED_SUPER_ADMIN_CLERK_UID:-}
    depends_on:
      redis:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    command: npm run start:prod
    networks:
      - kindercare-network

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    networks:
      - kindercare-network

networks:
  kindercare-network:
    driver: bridge

volumes:
  redis_data:
  uploads_data:
